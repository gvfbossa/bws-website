<div class="wrapper">
    <div class="contact-section">
        <div class="text-container">
            <h1 class="title-component">Contato</h1>
            <h3>Solicite seu orçamento conosco<br><br><br></h3>   
            <div class="adjust-content">
                <img class="whatsapp" src="assets/images/contact_whatsapp.png" alt="WhatsApp Bossa Web Solutions"/>
                <h3>
                    <a target="_blank" href="https://api.whatsapp.com/send/?phone=5511953468808" class="whatsapp-link">
                        &nbsp;(11) 95346-8808
                    </a>
                    <br>
                </h3>
            </div>
            <div class="adjust-content">
                <mat-icon class="mat-icon-style">email</mat-icon>
                <h3>
                    <a href="mailto:" class="whatsapp-link">
                        &nbsp;contato.bossaws&#64;gmail.com
                    </a> 
                </h3>  
            </div>  
        </div>
    </div>
    <div class="container" id="contact">
        <form (ngSubmit)="submitForm(contactForm)" #contactForm="ngForm" novalidate class="form-section">
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" class="form-control" id="name" name="name" required [minlength]="3"
                (blur)="validateField('name', contactForm)" ngModel #name="ngModel">
                <div *ngIf="name.invalid && name.touched" class="text-danger">
                    Nome deve conter pelo menos 3 caracteres
                </div>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" class="form-control" id="email" name="email" required email
                (blur)="validateField('email', contactForm)" ngModel #email="ngModel">
                <div *ngIf="email.invalid && email.touched" class="text-danger">
                    Email deve estar no formato correto
                </div>
            </div>
            <div class="form-group">
                <label for="phone">Telefone</label>
                <input type="text" class="form-control" id="phone" name="phone" required pattern="[0-9]{10,}"
                (blur)="validateField('phone', contactForm)" ngModel #phone="ngModel">
                <div *ngIf="phone.invalid && phone.touched" class="text-danger">
                    Telefone deve conter pelo menos 10 números
                </div>
            </div>
            <div class="form-group">
                <label for="message">Mensagem</label>
                <textarea class="form-control" id="message" name="message" rows="5" required
                (blur)="validateField('message', contactForm)" ngModel #message="ngModel"></textarea>
                <div *ngIf="message.invalid && message.touched" class="text-danger">
                    Mensagem deve conter pelo menos 20 caracteres
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>
</div>
